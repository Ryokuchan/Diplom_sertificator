apiVersion: apps/v1
kind: Deployment
metadata:
  name: diasoft-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: diasoft-api
  template:
    metadata:
      labels:
        app: diasoft-api
    spec:
      containers:
      - name: api
        image: diasoft-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: diasoft-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis-service:6379"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: diasoft-secrets
              key: jwt-secret
        - name: ENVIRONMENT
          value: "production"
        - name: PUBLIC_BASE_URL
          value: "http://diasoft-api-service"
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: diasoft-api-service
spec:
  selector:
    app: diasoft-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: diasoft-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: diasoft-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
